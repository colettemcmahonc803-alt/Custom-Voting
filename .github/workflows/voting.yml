




















name: Community Voting

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  handle-vote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.issue;
            const comment = context.payload.comment?.body || context.payload.issue.body;

            if (comment.includes('/vote')) {
              console.log("Vote command detected!");
              // You can add logic here to post a poll or tally
              await github.rest.issues.createComment({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                body: "✅ Voting started! React with 👍 / 👎"
              });
            }
